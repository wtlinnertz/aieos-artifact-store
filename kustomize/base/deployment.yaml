apiVersion: apps/v1
kind: Deployment
metadata:
  name: aieos-artifact-store
  labels:
    app.kubernetes.io/name: aieos-artifact-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aieos-artifact-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aieos-artifact-store
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Image is substituted at publish time by the kustomize-build adapter
          # (publish.manifest contract) — the placeholder below is replaced by
          # `kustomize edit set image`.
          image: ghcr.io/wtlinnertz/aieos-artifact-store:PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
