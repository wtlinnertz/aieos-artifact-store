apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aieos-artifact-store

commonLabels:
  app.kubernetes.io/part-of: aieos
  app.kubernetes.io/managed-by: flux

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

# kustomize edit set image rewrites this entry at publish time. The
# publish.manifest adapter substitutes the OCI digest from the CI run.
images:
  - name: ghcr.io/wtlinnertz/aieos-artifact-store
    newTag: PLACEHOLDER
