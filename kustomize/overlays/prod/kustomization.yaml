apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aieos-artifact-store-prod

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: aieos-artifact-store
    patch: |-
      - op: replace
        path: /metadata/name
        value: aieos-artifact-store-prod
  - target:
      kind: Deployment
      name: aieos-artifact-store
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
