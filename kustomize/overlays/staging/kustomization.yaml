apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aieos-artifact-store-staging

resources:
  - ../../base

patches:
  - target:
      kind: Namespace
      name: aieos-artifact-store
    patch: |-
      - op: replace
        path: /metadata/name
        value: aieos-artifact-store-staging
  - target:
      kind: Deployment
      name: aieos-artifact-store
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
