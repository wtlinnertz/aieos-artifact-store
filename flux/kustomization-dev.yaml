apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: aieos-artifact-store-dev
  namespace: flux-system
spec:
  interval: 1m
  targetNamespace: aieos-artifact-store-dev
  sourceRef:
    kind: GitRepository
    name: aieos-artifact-store-manifests
  path: "./envs/dev"
  prune: true
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: aieos-artifact-store
      namespace: aieos-artifact-store-dev
