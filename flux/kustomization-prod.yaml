apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: aieos-artifact-store-prod
  namespace: flux-system
spec:
  interval: 1m
  targetNamespace: aieos-artifact-store-prod
  sourceRef:
    kind: GitRepository
    name: aieos-artifact-store-manifests
  path: "./envs/prod"
  prune: true
  timeout: 10m
  # Manual-gate-required in the CD spec is enforced at the pipeline runner
  # level (promotions[].type). Flux itself reconciles whatever ends up on
  # the manifests repo; the gate prevents publish.manifest from running
  # without approval.
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: aieos-artifact-store
      namespace: aieos-artifact-store-prod
